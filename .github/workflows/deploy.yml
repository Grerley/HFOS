name: Deploy to Cloudflare Workers

# Auto-deploys the HFOS app to Cloudflare on every push to main.
# Secrets are managed here (GitHub Actions), never by hand in the dashboard.
#
# Required GitHub repository secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   — token with "Edit Cloudflare Workers" + D1 edit permissions
#   HFOS_SECRET_KEY        — JWT signing secret (any long random string)
#   CLOUDFLARE_ACCOUNT_ID  — optional; only needed if the token is not account-scoped

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build (OpenNext → Workers)
        run: npx opennextjs-cloudflare build

      - name: Apply D1 migrations (remote)
        run: npx wrangler d1 migrations apply hfos-db --remote

      - name: Deploy Worker
        run: npx wrangler deploy

      - name: Sync runtime secret to the Worker
        run: printf '%s' "$HFOS_SECRET_KEY" | npx wrangler secret put HFOS_SECRET_KEY
        env:
          HFOS_SECRET_KEY: ${{ secrets.HFOS_SECRET_KEY }}

      # Optional secrets — synced only when set, so the deploy never fails if a
      # secret hasn't been added yet. Add these in Settings → Secrets → Actions.
      - name: Sync Resend API key (if set)
        run: |
          if [ -n "$RESEND_API_KEY" ]; then
            printf '%s' "$RESEND_API_KEY" | npx wrangler secret put RESEND_API_KEY
          else
            echo "RESEND_API_KEY not set — email delivery stays disabled."
          fi
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

      - name: Sync Anthropic API key (if set)
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            printf '%s' "$ANTHROPIC_API_KEY" | npx wrangler secret put ANTHROPIC_API_KEY
          else
            echo "ANTHROPIC_API_KEY not set — copilot uses Workers AI."
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Sync cron secret for reminders (if set)
        run: |
          if [ -n "$CRON_SECRET" ]; then
            printf '%s' "$CRON_SECRET" | npx wrangler secret put CRON_SECRET
          else
            echo "CRON_SECRET not set — payment reminders stay disabled."
          fi
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      - name: Sync WhatsApp secrets (if set)
        env:
          WHATSAPP_PROVIDER: ${{ secrets.WHATSAPP_PROVIDER }}
          WHATSAPP_TOKEN: ${{ secrets.WHATSAPP_TOKEN }}
          WHATSAPP_PHONE_ID: ${{ secrets.WHATSAPP_PHONE_ID }}
          WHATSAPP_TEMPLATE: ${{ secrets.WHATSAPP_TEMPLATE }}
          WHATSAPP_TEMPLATE_LANG: ${{ secrets.WHATSAPP_TEMPLATE_LANG }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM: ${{ secrets.TWILIO_WHATSAPP_FROM }}
        run: |
          for name in WHATSAPP_PROVIDER WHATSAPP_TOKEN WHATSAPP_PHONE_ID WHATSAPP_TEMPLATE WHATSAPP_TEMPLATE_LANG TWILIO_ACCOUNT_SID TWILIO_AUTH_TOKEN TWILIO_WHATSAPP_FROM; do
            val="${!name}"
            if [ -n "$val" ]; then printf '%s' "$val" | npx wrangler secret put "$name"; else echo "$name not set — skipping"; fi
          done
