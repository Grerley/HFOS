name = "hfos"
main = ".open-next/worker.js"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

# Static assets (Next.js output) served by the Worker.
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Cloudflare D1 database (created via MCP; id is live).
[[d1_databases]]
binding = "DB"
database_name = "hfos-db"
database_id = "bd46243a-954d-4465-98ac-7f91e230661b"
migrations_dir = "migrations"

# Workers AI — native LLM binding, no API key/secret to manage. This same
# binding also routes Claude via AI Gateway (provider "ai-gateway"). Powers the
# copilot's natural-language phrasing (numbers still come from the calc engine).
[ai]
binding = "AI"

# Non-secret vars. Secrets (HFOS_SECRET_KEY, HFOS_ENCRYPTION_KEY) are set with
#   wrangler secret put HFOS_SECRET_KEY
# or in the dashboard → Worker → Settings → Variables (encrypted).
#
# HFOS_COPILOT_PROVIDER selects how the copilot phrases answers:
#   "auto"        cost-first (default) — free native Workers AI on every request,
#                 spilling over to Claude (AI Gateway) only when the native call
#                 fails, e.g. the daily free-tier allowance is spent. Then rules.
#   "ai-gateway"  Claude first, degrading to the native model, then rules.
#   "anthropic"   direct Anthropic API first — set the ANTHROPIC_API_KEY secret.
#   "workers-ai"  native model only, then rules.
#   "rules"       deterministic, no LLM.
# Every chain ends at the deterministic rule engine, so it never hard-fails.
#
# HFOS_AI_GATEWAY_ID: AI Gateway name for the Claude tier (defaults to "default").
# HFOS_COPILOT_MODEL: override the Claude-tier model (default anthropic/claude-sonnet-4.5);
#   bump it as Cloudflare's catalog lists newer Claude models.
[vars]
HFOS_COPILOT_PROVIDER = "auto"
HFOS_AI_GATEWAY_ID = "hfos"
# Transactional email sender. Resend's onboarding domain works out of the box but
# only delivers to your own account email — replace with a verified domain address
# (e.g. "HFOS <noreply@yourdomain.com>") once you've verified a domain in Resend.
EMAIL_FROM = "HFOS <onboarding@resend.dev>"
